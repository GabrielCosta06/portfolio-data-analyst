 Arial, sans-serif" font-size="30" fill="#102033" font-weight="700">23.1 h</text><text x="752" y="264" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">Observed across Aug 29 to</text><text x="752" y="284" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">Sep 3, 2024 production</text><text x="752" y="304" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">runs.</text><rect x="1044" y="162" width="300" height="130" rx="22" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><rect x="1044" y="162" width="10" height="130" rx="10" fill="#415a77" /><text x="1072" y="196" font-family="Space Grotesk, Arial, sans-serif" font-size="14" fill="#5b6b7c" font-weight="600">Output vs target</text><text x="1072" y="234" font-family="Space Grotesk, Arial, sans-serif" font-size="30" fill="#102033" font-weight="700">97.9%</text><text x="1072" y="264" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">Good units after modeled</text><text x="1072" y="284" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">loss and rework penalties.</text><rect x="84" y="326" width="620" height="250" rx="24" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><text x="112" y="368" font-family="Space Grotesk, Arial, sans-serif" font-size="22" fill="#102033" font-weight="700">Shift cost profile</text><text x="112" y="420.0" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="600">Swing</text><rect x="112" y="434.0" width="410" height="12" rx="6" fill="#d9f2ef" /><rect x="112" y="434.0" width="410.0" height="12" rx="6" fill="#197278" /><text x="564" y="446.0" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="700">R$ 0.07</text><text x="112" y="468.0" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="500">68.3% efficiency | 9.7 h downtime</text><text x="112" y="463.3333333333333" font-fami