ect x="752" y="538.0" width="201.23359580052494" height="12" rx="6" fill="#e47a2e" /><text x="1204" y="550.0" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="700">187 min</text><text x="752" y="572.0" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="500">R$ 2.6K impact</text><rect x="84" y="604" width="620" height="220" rx="24" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><text x="112" y="646" font-family="Space Grotesk, Arial, sans-serif" font-size="22" fill="#102033" font-weight="700">Cost stack</text><line x1="112" y1="706" x2="676" y2="706" stroke="#d7e0ea" stroke-width="1" /><text x="112.0" y="694" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="700">Driver</text><text x="394.0" y="694" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="700">Value</text><line x1="112" y1="756" x2="676" y2="756" stroke="#d7e0ea" stroke-width="1" /><text x="112.0" y="736" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Standard run cost</text><text x="394.0" y="736" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 30.9K</text><line x1="112" y1="796" x2="676" y2="796" stroke="#d7e0ea" stroke-width="1" /><text x="112.0" y="776" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Downtime cost</text><text x="394.0" y="776" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 19.5K</text><line x1="112" y1="836" x2="676" y2="836" stroke="#d7e0ea" stroke-width="1" /><text x="112.0" y="816" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Quality loss cost</text><text x="394.0" y="816" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 3.5K</text><line x1="112" y1="876" x2="676" y2="876" stroke="#d7e0ea" stroke-width="1" /><text x="112.0" y="856" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Total controllable cost</text><text x="394.0" y="856" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 54.0K</text><rect x="724" y="604" width="620" height="220" rx="24" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><text x="752" y="646" font-family="Space Grotesk, Arial, sans-serif" font-size="22" fill="#102033" font-weight="700">What stands out</text><circle cx="762" cy="690" r="6" fill="#197278" /><text x="780" y="696" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">Setup &amp; calibration issues account for 381</text><text x="780" y="718" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">minutes, the largest downtime bucket in the</text><text x="780" y="740" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">sample window.</text><circle cx="762" cy="762" r="6" fill="#197278" /><text x="780" y="768" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">Swing shift runs at 0.073 BRL per good unit, the</text><text x="780" y="790" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">highest shift cost profile.</text><circle cx="762" cy="834" r="6" fill="#197278" /><text x="780" y="840" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">The line averages 67.1% efficiency with 23.1</text><text x="780" y="862" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">downtime hours across 38 batches.</text>
