<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Cost What-If Analysis</title>
  <desc id="desc">Quantify wage sensitivity and the savings from cutting downtime or loss.</desc>
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5fafb" />
      <stop offset="100%" stop-color="#eef3fb" />
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg-gradient)" />
  <rect x="32" y="26" width="1376" height="848" rx="30" fill="#eef4f9" />
  <text x="84" y="88" font-family="Space Grotesk, Arial, sans-serif" font-size="34" fill="#102033" font-weight="700">Cost What-If Analysis</text>
  <text x="84" y="122" font-family="Manrope, Arial, sans-serif" font-size="17" fill="#5b6b7c">Quantify wage sensitivity and the savings from cutting downtime or loss.</text>
  <rect x="84" y="162" width="300" height="130" rx="22" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><rect x="84" y="162" width="10" height="130" rx="10" fill="#197278" /><text x="112" y="196" font-family="Space Grotesk, Arial, sans-serif" font-size="14" fill="#5b6b7c" font-weight="600">Baseline CPU</text><text x="112" y="234" font-family="Space Grotesk, Arial, sans-serif" font-size="30" fill="#102033" font-weight="700">R$ 0.07</text><text x="112" y="264" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">Current modeled state from</text><text x="112" y="284" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">the observed line</text><text x="112" y="304" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">performance.</text><rect x="404" y="162" width="300" height="130" rx="22" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><rect x="404" y="162" width="10" height="130" rx="10" fill="#e47a2e" /><text x="432" y="196" font-family="Space Grotesk, Arial, sans-serif" font-size="14" fill="#5b6b7c" font-weight="600">Best scenario</text><text x="432" y="234" font-family="Space Grotesk, Arial, sans-serif" font-size="30" fill="#102033" font-weight="700">Downtime -15%</text><text x="432" y="264" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">-5.4% cost / unit vs</text><text x="432" y="284" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">baseline.</text><rect x="724" y="162" width="300" height="130" rx="22" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><rect x="724" y="162" width="10" height="130" rx="10" fill="#2a9d8f" /><text x="752" y="196" font-family="Space Grotesk, Arial, sans-serif" font-size="14" fill="#5b6b7c" font-weight="600">25% savings pool</text><text x="752" y="234" font-family="Space Grotesk, Arial, sans-serif" font-size="30" fill="#102033" font-weight="700">R$ 1.6K</text><text x="752" y="264" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">Savings if the top five</text><text x="752" y="284" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">queue items each shrink by</text><text x="752" y="304" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">one quarter.</text><rect x="1044" y="162" width="300" height="130" rx="22" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><rect x="1044" y="162" width="10" height="130" rx="10" fill="#415a77" /><text x="1072" y="196" font-family="Space Grotesk, Arial, sans-serif" font-size="14" fill="#5b6b7c" font-weight="600">Wage sensitivity</text><text x="1072" y="234" font-family="Space Grotesk, Arial, sans-serif" font-size="30" fill="#102033" font-weight="700">+4.0% cost / unit</text><text x="1072" y="264" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">Modeled with a 10% wage-</text><text x="1072" y="284" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">rate increase and no</text><text x="1072" y="304" font-family="Manrope, Arial, sans-serif" font-size="14" fill="#5b6b7c">operational improvement.</text><rect x="84" y="326" width="620" height="250" rx="24" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><text x="112" y="368" font-family="Space Grotesk, Arial, sans-serif" font-size="22" fill="#102033" font-weight="700">Scenario comparison</text><text x="112" y="420.0" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="600">Baseline</text><rect x="112" y="434.0" width="410" height="12" rx="6" fill="#d9f2ef" /><rect x="112" y="434.0" width="394.26546076753857" height="12" rx="6" fill="#197278" /><text x="564" y="446.0" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="700">R$ 0.07</text><text x="112" y="468.0" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="500">0.0% change vs baseline</text><text x="112" y="452.5" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="600">Downtime -15%</text><rect x="112" y="466.5" width="410" height="12" rx="6" fill="#d9f2ef" /><rect x="112" y="466.5" width="372.85964887054797" height="12" rx="6" fill="#197278" /><text x="564" y="478.5" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="700">R$ 0.06</text><text x="112" y="500.5" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="500">-5.4% cost / unit vs baseline</text><text x="112" y="485.0" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="600">Loss -12%</text><rect x="112" y="499.0" width="410" height="12" rx="6" fill="#d9f2ef" /><rect x="112" y="499.0" width="393.13945964599475" height="12" rx="6" fill="#197278" /><text x="564" y="511.0" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="700">R$ 0.07</text><text x="112" y="533.0" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="500">-0.3% cost / unit vs baseline</text><text x="112" y="517.5" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="600">Wage +10%</text><rect x="112" y="531.5" width="410" height="12" rx="6" fill="#d9f2ef" /><rect x="112" y="531.5" width="410.0" height="12" rx="6" fill="#197278" /><text x="564" y="543.5" font-family="Space Grotesk, Arial, sans-serif" font-size="15" fill="#102033" font-weight="700">R$ 0.07</text><text x="112" y="565.5" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="500">+4.0% cost / unit vs baseline</text><rect x="724" y="326" width="620" height="250" rx="24" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><text x="752" y="368" font-family="Space Grotesk, Arial, sans-serif" font-size="22" fill="#102033" font-weight="700">Action queue</text><line x1="752" y1="428" x2="1316" y2="428" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="416" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="700">Rank</text><text x="893.0" y="416" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="700">Product</text><text x="1034.0" y="416" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="700">Category</text><text x="1175.0" y="416" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="700">25% save</text><line x1="752" y1="478" x2="1316" y2="478" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="458" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">1</text><text x="893.0" y="458" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">CO-600</text><text x="1034.0" y="458" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Material Flow</text><text x="1175.0" y="458" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 413.07</text><line x1="752" y1="518" x2="1316" y2="518" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="498" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">2</text><text x="893.0" y="498" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">CO-2L</text><text x="1034.0" y="498" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Setup &amp; Calibration</text><text x="1175.0" y="498" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 372.51</text><line x1="752" y1="558" x2="1316" y2="558" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="538" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">3</text><text x="893.0" y="538" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">RB-600</text><text x="1034.0" y="538" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Setup &amp; Calibration</text><text x="1175.0" y="538" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 294.60</text><line x1="752" y1="598" x2="1316" y2="598" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="578" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">4</text><text x="893.0" y="578" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">CO-600</text><text x="1034.0" y="578" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Equipment Reliability</text><text x="1175.0" y="578" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 282.52</text><line x1="752" y1="638" x2="1316" y2="638" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="618" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">5</text><text x="893.0" y="618" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">LE-600</text><text x="1034.0" y="618" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Changeover</text><text x="1175.0" y="618" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">R$ 262.24</text><rect x="84" y="604" width="620" height="220" rx="24" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><text x="112" y="646" font-family="Space Grotesk, Arial, sans-serif" font-size="22" fill="#102033" font-weight="700">Recommended actions</text><circle cx="122" cy="690" r="6" fill="#2a9d8f" /><text x="140" y="696" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">Stabilize setup sheets and first-article checks</text><text x="140" y="718" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">on the swing shift, where setup and calibration</text><text x="140" y="740" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">losses are largest.</text><circle cx="122" cy="762" r="6" fill="#2a9d8f" /><text x="140" y="768" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">Prioritize preventive maintenance around</text><text x="140" y="790" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">machine-adjustment and machine-failure events</text><text x="140" y="812" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">before the next CO-2L and RB-600 runs.</text><circle cx="122" cy="834" r="6" fill="#2a9d8f" /><text x="140" y="840" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">Pre-stage packaging and materials one batch</text><text x="140" y="862" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">ahead to cut inventory-shortage minutes without</text><text x="140" y="884" font-family="Manrope, Arial, sans-serif" font-size="15" fill="#5b6b7c">adding labor.</text><rect x="724" y="604" width="620" height="220" rx="24" fill="#ffffff" stroke="#d7e0ea" stroke-width="1.5" /><text x="752" y="646" font-family="Space Grotesk, Arial, sans-serif" font-size="22" fill="#102033" font-weight="700">What-if assumptions</text><line x1="752" y1="706" x2="1316" y2="706" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="694" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="700">Lever</text><text x="1034.0" y="694" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#5b6b7c" font-weight="700">Change</text><line x1="752" y1="756" x2="1316" y2="756" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="736" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Wage rate</text><text x="1034.0" y="736" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">+10% hourly labor cost</text><line x1="752" y1="796" x2="1316" y2="796" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="776" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Downtime</text><text x="1034.0" y="776" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">-15% downtime minutes</text><line x1="752" y1="836" x2="1316" y2="836" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="816" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Loss / scrap</text><text x="1034.0" y="816" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">-12% modeled loss units</text><line x1="752" y1="876" x2="1316" y2="876" stroke="#d7e0ea" stroke-width="1" /><text x="752.0" y="856" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Savings logic</text><text x="1034.0" y="856" font-family="Space Grotesk, Arial, sans-serif" font-size="13" fill="#102033" font-weight="500">Top queue uses 25% reduction case</text>
</svg>
